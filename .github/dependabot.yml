version: 2
updates:
  # Enable Dependabot for Python dependencies (pyproject.toml and requirements files)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 5
    reviewers:
      - "thruthseeker"
    # Only auto-merge minor and patch updates, not major versions
    allow:
      - dependency-type: "all"
    commit-message:
      prefix: "deps:"
      prefix-development: "deps-dev:"
      include: "scope"
    # Request a review for security and major version updates
    pull-request-branch-name:
      separator: "/"

  # Enable Dependabot for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci:"
      include: "scope"
